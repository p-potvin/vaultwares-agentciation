name: Task Dispatch

# Triggered by external systems (e.g., LonelyManager or CI pipelines) via
# repository_dispatch, or manually for testing.
#
# Payload example for repository_dispatch:
#   {
#     "event_type": "task_dispatch",
#     "client_payload": {
#       "target_agent": "image-agent",
#       "task": "generate_image",
#       "description": "Generate a test image",
#       "prompt": "A futuristic city at night",
#       "model": "sdxl"
#     }
#   }

on:
  repository_dispatch:
    types: [task_dispatch]
  workflow_dispatch:
    inputs:
      target_agent:
        description: "Agent ID to receive the task (e.g. image-agent)"
        required: true
        default: "image-agent"
      task:
        description: "Task identifier (e.g. generate_image)"
        required: true
        default: "generate_image"
      description:
        description: "Human-readable task description"
        required: false
        default: "Dispatch triggered from GitHub Actions"

jobs:
  dispatch:
    name: Dispatch task to agent
    runs-on: ubuntu-latest

    steps:
      - name: Checkout submodule
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start Redis (ephemeral, for dispatch only)
        run: |
          sudo apt-get install -y redis-server
          redis-server redis.conf --daemonize yes
          sleep 1

      - name: Dispatch task via Python
        env:
          TARGET_AGENT: ${{ github.event.client_payload.target_agent || inputs.target_agent }}
          TASK: ${{ github.event.client_payload.task || inputs.task }}
          DESCRIPTION: ${{ github.event.client_payload.description || inputs.description }}
        run: |
          python - <<'EOF'
          import os, sys, json
          sys.path.insert(0, ".")
          from vaultwares_agentciation import LonelyManager

          target = os.environ["TARGET_AGENT"]
          task   = os.environ["TASK"]
          desc   = os.environ.get("DESCRIPTION", "")

          manager = LonelyManager(agent_id="ci-dispatcher")
          manager.start()

          manager.assign_task(target, task, description=desc)
          print(f"✅ Task '{task}' dispatched to '{target}'")

          manager.stop()
          EOF
