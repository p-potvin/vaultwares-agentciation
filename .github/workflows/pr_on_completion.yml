name: PR on Task Completion

# Creates a pull request when an agent reports task completion.
# Triggered by repository_dispatch from any agent that calls
# coordinator.publish("TASK_COMPLETE", ...) after finishing work.
#
# Payload example:
#   {
#     "event_type": "task_complete",
#     "client_payload": {
#       "agent_id": "image-agent",
#       "task": "generate_image",
#       "branch": "agent/image-agent/generate-image-20260406",
#       "title": "feat(image-agent): generated image from prompt",
#       "body": "Completed task: generate_image\n\nResult: ..."
#     }
#   }

on:
  repository_dispatch:
    types: [task_complete]

jobs:
  open-pr:
    name: Open PR for completed agent task
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate payload
        id: validate
        run: |
          AGENT="${{ github.event.client_payload.agent_id }}"
          TASK="${{ github.event.client_payload.task }}"
          BRANCH="${{ github.event.client_payload.branch }}"

          if [ -z "$AGENT" ] || [ -z "$TASK" ] || [ -z "$BRANCH" ]; then
            echo "❌ Missing required payload fields: agent_id, task, branch"
            exit 1
          fi

          echo "agent=$AGENT"   >> "$GITHUB_OUTPUT"
          echo "task=$TASK"     >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const agent  = "${{ steps.validate.outputs.agent }}";
            const task   = "${{ steps.validate.outputs.task }}";
            const branch = "${{ steps.validate.outputs.branch }}";
            const title  = "${{ github.event.client_payload.title }}"
                           || `feat(${agent}): completed task '${task}'`;
            const body   = "${{ github.event.client_payload.body }}"
                           || `Automated PR created by **${agent}** after completing task \`${task}\`.`;

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title,
              body,
              head:  branch,
              base:  "main",
            });

            console.log(`✅ PR #${pr.number} created: ${pr.html_url}`);
            core.setOutput("pr_url", pr.html_url);
            core.setOutput("pr_number", pr.number);
